<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Carta de Presentación — {{CANDIDATE_NAME}}</title>
<style>
  @font-face {
    font-family: 'Space Grotesk';
    src: url('../fonts/space-grotesk-latin.woff2') format('woff2');
    font-weight: 300 700; font-style: normal; font-display: swap;
  }
  @font-face {
    font-family: 'DM Sans';
    src: url('../fonts/dm-sans-latin.woff2') format('woff2');
    font-weight: 100 1000; font-style: normal; font-display: swap;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { -webkit-print-color-adjust: exact; print-color-adjust: exact; }

  body {
    font-family: 'DM Sans', sans-serif;
    font-size: 11px;
    line-height: 1.65;
    color: #1a1a2e;
    background: #ffffff;
  }

  .page {
    width: 100%;
    max-width: 210mm;
    margin: 0 auto;
    padding: 0;
  }

  .header { margin-bottom: 22px; }

  .header h1 {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 26px;
    font-weight: 700;
    color: #1a1a2e;
    letter-spacing: -0.02em;
    margin-bottom: 6px;
    line-height: 1.1;
  }

  .header-gradient {
    height: 2px;
    background: linear-gradient(to right, hsl(187, 74%, 32%), hsl(270, 70%, 45%));
    border-radius: 1px;
    margin-bottom: 10px;
  }

  .contact-row {
    display: flex;
    flex-wrap: wrap;
    gap: 8px 14px;
    font-size: 10.5px;
    color: #555;
  }
  .contact-row .separator { color: #ccc; }

  .letter-meta {
    font-size: 10.5px;
    color: #666;
    margin-bottom: 20px;
  }

  .letter-meta .date { margin-bottom: 14px; }

  .recipient {
    font-size: 11px;
    line-height: 1.6;
    color: #333;
    margin-bottom: 18px;
  }

  .subject {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 11.5px;
    font-weight: 600;
    color: hsl(187, 74%, 28%);
    margin-bottom: 18px;
  }

  .body p {
    font-size: 11px;
    line-height: 1.7;
    color: #2a2a2a;
    margin-bottom: 14px;
    text-align: justify;
  }

  .body p strong { font-weight: 600; }

  .closing {
    font-size: 11px;
    color: #2a2a2a;
    margin-top: 20px;
    line-height: 1.7;
  }

  .signature {
    margin-top: 22px;
    font-family: 'Space Grotesk', sans-serif;
    font-size: 12px;
    font-weight: 600;
    color: #1a1a2e;
  }

  .signature-contact {
    font-size: 10.5px;
    color: #555;
    margin-top: 4px;
  }

  @media print {
    body { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
    .page { padding: 0; }
  }
</style>
</head>
<body>
<div class="page">

  <div class="header">
    <h1>{{CANDIDATE_NAME}}</h1>
    <div class="header-gradient"></div>
    <div class="contact-row">
      <span>{{PHONE}}</span>
      <span class="separator">|</span>
      <span>{{EMAIL}}</span>
      <span class="separator">|</span>
      <span>{{CITY}}</span>
    </div>
  </div>

  <div class="letter-meta">
    <div class="date">{{DATE}}</div>
  </div>

  <div class="recipient">
    {{RECIPIENT_TITLE}}<br>
    {{COMPANY}}
  </div>

  <div class="subject">RE: {{ROLE}}</div>

  <div class="body">
    <p>{{BODY_P1}}</p>
    <p>{{EMPHASIS_1}}</p>
    <p>{{EMPHASIS_2}}</p>
    <p>{{BODY_CLOSING}}</p>
  </div>

  <div class="closing">
    Adjunto mi currículum. Muchas gracias por su tiempo.
  </div>

  <div class="signature">
    {{CANDIDATE_NAME}}
    <div class="signature-contact">{{PHONE}} · {{EMAIL}} · {{CITY}}</div>
  </div>

</div>
</body>
</html>
